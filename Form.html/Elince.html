<!DOCTYPE html>
<html>
<head>
    <title>License Application Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .form-container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>License Form</h2>

    <form onsubmit="return submitForm()">

        <label>Full Name</label>
        <input type="text" id="name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>License Type</label>
        <select id="type">
            <option>Driving License</option>
            <option>Business License</option>
            <option>Shop License</option>
        </select>

        <label>Upload Document</label>
        <input type="file">

        <button type="submit">Submit</button>
    </form>
</div>

<script>
function submitForm() {
    alert("Form Submitted Successfully!");
    return true;
}
</script>

</body>
</html>
